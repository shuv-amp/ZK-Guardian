version: '3.8'

services:
  gateway:
    environment:
      - NODE_ENV=production
      - SMART_AUTH_MODE=external
      - ALLOW_DEV_BYPASS=false
      - ENABLE_SYNTHETIC_CONSENT=false
      - ENABLE_BATCH_AUDIT=false
      - CIRCUIT_ARTIFACTS_DIR=/workspace/circuits/build
      - SMART_ISSUER=${SMART_ISSUER}
      - SMART_AUTHORIZATION_ENDPOINT=${SMART_AUTHORIZATION_ENDPOINT}
      - SMART_TOKEN_ENDPOINT=${SMART_TOKEN_ENDPOINT}
      - SMART_INTROSPECTION_ENDPOINT=${SMART_INTROSPECTION_ENDPOINT}
      - SMART_REVOCATION_ENDPOINT=${SMART_REVOCATION_ENDPOINT}
      - SMART_JWKS_URI=${SMART_JWKS_URI}
