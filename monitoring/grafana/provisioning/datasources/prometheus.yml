# Grafana Datasource Provisioning
# Auto-configure Prometheus as the default datasource

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      
  - name: ZK Guardian Metrics
    type: prometheus
    access: proxy
    url: http://gateway:3000/metrics
    isDefault: false
    editable: true
    jsonData:
      timeInterval: "30s"
