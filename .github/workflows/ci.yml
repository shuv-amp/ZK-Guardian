name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8'

jobs:
  # ============================================
  # Lint and Type Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Lint
        run: pnpm run lint
      
      - name: Type check
        run: pnpm run typecheck

  # ============================================
  # Gateway Tests
  # ============================================
  test-gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: zkguardian
          POSTGRES_PASSWORD: zkguardian_test
          POSTGRES_DB: zkguardian_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Generate Prisma Client
        run: pnpm --filter gateway exec prisma generate
      
      - name: Run migrations
        run: pnpm --filter gateway exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://zkguardian:zkguardian_test@localhost:5432/zkguardian_test
      
      - name: Run tests
        run: pnpm --filter gateway test --coverage
        env:
          DATABASE_URL: postgresql://zkguardian:zkguardian_test@localhost:5432/zkguardian_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./gateway/coverage/lcov.info
          flags: gateway

  # ============================================
  # Contract Tests
  # ============================================
  test-contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Compile contracts
        run: pnpm --filter contracts compile
      
      - name: Run tests
        run: pnpm --filter contracts test
      
      - name: Check gas usage
        run: pnpm --filter contracts test:gas

  # ============================================
  # Circuit Tests
  # ============================================
  test-circuits:
    name: ZK Circuit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install Circom
        run: |
          curl -L https://github.com/iden3/circom/releases/latest/download/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom
          circom --version
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Verify circuit integrity (ZK1)
        run: |
          echo "Verifying circuit checksums..."
          cd circuits
          sha256sum AccessIsAllowedSecure_final.zkey > /tmp/actual_zkey.sha256
          sha256sum BreakGlass_final.zkey >> /tmp/actual_zkey.sha256
          # Check verification keys match expected
          if [ -f "checksums.sha256" ]; then
            sha256sum -c checksums.sha256
            echo "✓ Circuit integrity verified"
          else
            echo "⚠ No checksums.sha256 found - creating initial checksums"
            sha256sum AccessIsAllowedSecure_final.zkey BreakGlass_final.zkey > checksums.sha256
          fi
      
      - name: Run circuit tests
        run: pnpm --filter circuits test

  # ============================================
  # SDK Tests
  # ============================================
  test-sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build SDK
        run: pnpm --filter @zk-guardian/sdk build
      
      - name: Run tests
        run: pnpm --filter @zk-guardian/sdk test

  # ============================================
  # Mobile App Build Check
  # ============================================
  build-mobile:
    name: Mobile Build Check
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Type check mobile app
        run: pnpm --filter mobile typecheck
      
      - name: Export check
        run: pnpm --filter mobile export

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
      
      - name: Run Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
