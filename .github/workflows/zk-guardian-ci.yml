name: ZK Guardian CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  POLYGON_AMOY_RPC: "https://rpc-amoy.polygon.technology"

jobs:
  # Job 1: Verify Circom Circuits
  verify-circuits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      
      - name: Install Circom
        run: |
          curl -Ls https://github.com/iden3/circom/releases/download/v2.1.8/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom
      
      - name: Install dependencies
        run: npm ci
      
      - name: Compile circuits
        run: |
          mkdir -p circuits/build
          # Note: In production CI, we might skip full recompile if artifacts cached, 
          # but here we ensure correctness.
          circom circuits/AccessIsAllowed.circom --r1cs --wasm --sym -o circuits/build -l node_modules/circomlib/circuits
      
      - name: Verify circuit constraints
        run: |
          snarkjs r1cs info circuits/build/AccessIsAllowed.r1cs

  # Job 2: Run Tests
  test:
    runs-on: ubuntu-latest
    needs: verify-circuits
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci

      # Re-compile circuits or fetch from artifacts (simplified here to re-compile for robustness)
      - name: Install Circom
        run: |
          curl -Ls https://github.com/iden3/circom/releases/download/v2.1.8/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom

      - name: Compile circuits
        run: |
          mkdir -p circuits/build
          circom circuits/AccessIsAllowed.circom --r1cs --wasm --sym -o circuits/build -l node_modules/circomlib/circuits

      - name: Mock Trusted Setup (Fast for CI)
        run: |
          # Use a pre-generated ptau or generate a small one for testing
          snarkjs powersoftau new bn128 12 circuits/build/pot12_0000.ptau -v
          snarkjs powersoftau prepare phase2 circuits/build/pot12_0000.ptau circuits/build/pot12_final.ptau -v
          snarkjs groth16 setup circuits/build/AccessIsAllowed.r1cs circuits/build/pot12_final.ptau circuits/build/AccessIsAllowed_final.zkey

      - name: Run Circuit Tests
        run: npm test -- --grep "AccessIsAllowed"

      - name: Run Contract Tests
        working-directory: ./contracts
        run: |
          npm ci
          npx hardhat test

  # Job 3: Deploy Verifier Contract (Production Only)
  deploy-contract:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      
      - name: Install dependencies
        run: npm ci && cd contracts && npm ci
      
      - name: Deploy to Polygon Amoy
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        working-directory: ./contracts
        run: |
          # Uses the custom script we wrote, ensuring consistency!
          npx hardhat run scripts/deploy.js --network amoy
